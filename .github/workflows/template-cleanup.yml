---
# GitHub Actions Workflow responsible for cleaning up the Claude Starter Kit Template repository from
# the template-specific files and configurations. This workflow is supposed to be triggered manually by the user
# after a new template-based repository has been created.

name: Template Cleanup
on:
  workflow_dispatch:
    inputs:
      CC_MODEL:
        description: |
          Default model to use with claude-code.
          See https://code.claude.com/docs/en/model-config#model-aliases for model aliases.
        required: true
        default: default
        type: choice
        options:
          - default
          - sonnet
          - sonnet[1m]
          - opus
          - opus[1m]
          - opusplan
          - haiku
      CC_EFFORT_LEVEL:
        description: |
          Claude Code effort level. Controls reasoning depth.
          'default' removes the setting so Claude Code uses its built-in default.
        required: true
        default: high
        type: choice
        options:
          - high
          - medium
          - low
          - default
      CC_PERMISSION_MODE:
        description: |
          Claude Code permissions default mode.
        required: true
        default: default
        type: choice
        options:
          - default
          - plan
          - bypassPermissions
      LANGUAGES:
        description: |
          Programming languages (required, for profile detection).
          Comma-separated list (e.g., "python", "python,typescript", "java,kotlin").
        required: true
        type: string

jobs:
  # Run cleaning process only if workflow is triggered by the non-"claude-toolbox" repository.
  template-cleanup:
    name: Template Cleanup
    runs-on: ubuntu-latest
    if: github.event.repository.name != 'claude-toolbox'
    permissions:
      contents: write
    steps:
      # Check out current repository
      - name: Fetch Sources
        uses: actions/checkout@v6

      - name: Install Dependencies
        run: |
          # Install yq (mikefarah) for YAML processing
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Cleanup
        env:
          CC_MODEL: ${{ github.event.inputs.CC_MODEL }}
          CC_EFFORT_LEVEL: ${{ github.event.inputs.CC_EFFORT_LEVEL }}
          CC_PERMISSION_MODE: ${{ github.event.inputs.CC_PERMISSION_MODE }}
          LANGUAGES: ${{ github.event.inputs.LANGUAGES }}
        run: |
          chmod +x .github/scripts/template-cleanup.sh
          ./.github/scripts/template-cleanup.sh --ci --no-commit

      # Commit modified files
      - name: Commit files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Template cleanup"

      # Push changes
      - name: Push changes
        run: |-
          BRANCH=$(git branch --show-current)
          git push origin $BRANCH
