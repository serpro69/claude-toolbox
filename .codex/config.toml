#:schema https://developers.openai.com/codex/config-schema.json
model = "gpt-5.5"
model_reasoning_effort = "xhigh"
model_auto_compact_token_limit = 1000000
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[features]
codex_hooks = true

[agents]
max_threads = 6
max_depth = 1

[tui]
status_line = [
  "model-with-reasoning",
  "current-dir",
  "context-usage",
  "used-tokens",
  "five-hour-limit",
  "weekly-limit",
]
terminal_title = ["project", "git-branch", "status", "thread", "task-progress"]

# was hardcoded before support for codex is added in capy itself
# from there, 'capy setup' should handle adding this
# and it should be excluded from sync if SKIP_CAPY is set in template-state.json
# (needs to be added there for opt-in), because codex does not have a way to split configs into two,
# like we do with .claude/settings.json (fully synced) and .claude/settings.local.json (not synced)
[mcp_servers.capy]
command = "bash"
args = [".codex/scripts/capy.sh", "serve"]
