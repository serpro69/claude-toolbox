model = "gpt-5.5"
model_reasoning_effort = "xhigh"
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[features]
codex_hooks = true

[agents]
max_threads = 6
max_depth = 1

[tui]
status_line = ["model-with-reasoning", "current-dir"]

[mcp_servers.capy]
command = "bash"
args = [".codex/scripts/capy.sh", "serve"]
