source_plugin: klaude-plugin
target_plugin: kodex-plugin

skills:
  include_all: true
  overrides: []
  transforms:
    - type: plugin_root_resolve
      scope: all_md
      replacement_base: "../.."
    - type: inject_header
      content: |
        <!-- codex: tool-name mapping applied. See .codex/scripts/session-start.sh -->
    - type: skill_prefix_rewrite
      scope: all_md
      from: "/kk:"
      to: "$kk:"
  shared:
    copy: true

profiles:
  copy: true
  # Profiles deliberately do NOT get plugin_root_resolve: profiles/skill-md/*
  # documents the ${...PLUGIN_ROOT} convention and must keep the tokens literal.
  transforms:
    - type: skill_prefix_rewrite
      scope: all_md
      from: "/kk:"
      to: "$kk:"

agents:
  target_dir: ".codex/agents"
  sandbox_mode: "read-only"
  model: "gpt-5.5"
  model_reasoning_effort: "xhigh"
  overrides:
    - name: profile-resolver
      model: "gpt-5.4-mini"
  transforms:
    - type: plugin_root_placeholder
      placeholder: "<kk-plugin-root>"
      preamble: |
        ## Plugin root

        `<kk-plugin-root>` = root directory of the `kk` plugin installation. The spawning context must provide this path. If not provided, resolve by finding where kk plugin skills are loaded from and taking the parent of the `skills/` directory.
    - type: skill_prefix_rewrite
      from: "/kk:"
      to: "$kk:"

manifest:
  name: "kk"
  version_from: "klaude-plugin/.claude-plugin/plugin.json"
  extra_fields:
    skills: "./skills/"
    # mcpServers: "./.mcp.json"

mcp:
  servers:
    capy:
      command: "bash"
      args: [".codex/scripts/capy.sh", "serve"]
