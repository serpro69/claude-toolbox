---
# yaml-language-server: $schema=https://squidfunk.github.io/mkdocs-material/schema.json

site_name: claude-toolbox
site_url: !ENV [MKDOCS_SITE_URL, "http://localhost:8000"]
site_description: >-
  A structured AI development pipeline — skills, configs, MCP servers,
  hooks, and sub-agents for Claude Code and Codex.
copyright: Copyright &copy; 2024 - present, serpro69

repo_url: https://github.com/serpro69/claude-toolbox

exclude_docs: |
  wip/**
  done/**
  template-sync/**

watch:
  - docs/overrides

plugins:
  - search:
      separator: '[\s​\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - minify:
      minify_html: true
  - panzoom:
      always_show_hint: true

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: tokyonight:light
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: tokyonight:dark
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  icon:
    logo: material/console

extra:
  version:
    provider: mike

extra_css:
  - assets/stylesheets/tokyonight.css
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/terminal.js

markdown_extensions:
  - abbr
  - footnotes
  - attr_list
  - md_in_html
  - pymdownx.blocks.caption
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - def_list
  - admonition
  - toc:
      permalink: true
  - tables
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.extra
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.tilde
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.snippets:
      base_path:
        - !relative $config_dir
        - !relative $docs_dir
      check_paths: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: serpro69
      repo: claude-toolbox

nav:
  - "~/": index.md
  - Getting Started:
      - getting-started/index.md
      - Overview: getting-started/overview.md
      - Template Setup: getting-started/template-setup.md
      - Plugin-Only Setup: getting-started/plugin-only.md
      - Adopting Existing Repos: getting-started/adopting.md
      - Try It: getting-started/quickstart.md
  - User Guide:
      - user-guide/index.md
      - Skills: user-guide/skills.md
      - Profiles: user-guide/profiles.md
      - MCP Servers: user-guide/mcp-servers.md
      - Configuration: user-guide/configuration.md
      - Template Sync: user-guide/template-sync.md
  - Providers:
      - providers/index.md
      - Claude Code: providers/claude-code.md
      - Codex: providers/codex.md
  - Contributing:
      - contributing/index.md
      - Architecture: contributing/architecture.md
      - Plugin Development: contributing/plugin-development.md
      - Testing: contributing/testing.md
      - ADRs: contributing/adrs.md
  - About:
      - about/license.md
      - about/changelog.md
